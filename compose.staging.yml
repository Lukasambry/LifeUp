services:

  traefik:
    image: traefik:v3
    container_name: lifeup-traefik-staging
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"        
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"                  
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lifeup-network


  postgres:
    image: postgres:16-alpine
    container_name: lifeup-postgres-staging
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lifeup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
      POSTGRES_DB: ${POSTGRES_DB:-lifeup_staging}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lifeup-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifeup}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lifeup-redis-staging
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - lifeup-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: lifeup-mailpit-staging
    restart: unless-stopped
    networks:
      - lifeup-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailpit.rule=Host(`mail.${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.mailpit.entrypoints=web"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"


  backend:
    image: ghcr.io/lukasambry/lifeup-backend:${IMAGE_TAG:-latest}
    container_name: lifeup-backend-staging
    restart: always
    env_file:
      - packages/backend/.env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lifeup-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${API_DOMAIN:?API_DOMAIN requis}`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"


  web-admin:
    image: ghcr.io/lukasambry/lifeup-web-admin:${IMAGE_TAG:-latest}
    container_name: lifeup-web-admin-staging
    restart: always
    env_file:
      - packages/web-admin/.env.staging
    depends_on:
      - backend
    networks:
      - lifeup-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-admin.rule=Host(`${ADMIN_DOMAIN:?ADMIN_DOMAIN requis}`)"
      - "traefik.http.routers.web-admin.entrypoints=web"
      - "traefik.http.services.web-admin.loadbalancer.server.port=3001"

volumes:
  postgres_data:
  redis_data:

networks:
  lifeup-network:
    driver: bridge
