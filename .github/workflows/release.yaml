name: Release — Build & Push images

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/lifeup-backend
  WEB_ADMIN_IMAGE: ghcr.io/${{ github.repository_owner }}/lifeup-web-admin

jobs:
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend


      - name: Extract metadata (web-admin)
        id: meta-web-admin
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_ADMIN_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push web-admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web-admin/Dockerfile
          push: true
          tags: ${{ steps.meta-web-admin.outputs.tags }}
          labels: ${{ steps.meta-web-admin.outputs.labels }}
          
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          cache-from: type=gha,scope=web-admin
          cache-to: type=gha,mode=max,scope=web-admin
